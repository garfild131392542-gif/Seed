<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard QC - Bangkok Crystal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans min-h-screen p-2 md:p-10">
    <div class="max-w-7xl mx-auto">
      <div class="flex flex-col mb-8 gap-4">
        <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900 tracking-tight px-2">
          รายงานวิเคราะห์แนวโน้ม <span class="text-blue-600">Seed</span>
        </h1>

        <div class="flex overflow-x-auto hide-scrollbar gap-3 pb-2 px-2 w-full snap-x">
          <div class="flex-shrink-0 snap-start">
            <button
              onclick="openModal('add')"
              class="h-full px-5 py-2 rounded-xl text-sm font-bold bg-green-500 text-white shadow hover:bg-green-600 transition-all flex items-center whitespace-nowrap"
            >
              + เพิ่มข้อมูล
            </button>
          </div>

          <div class="flex-shrink-0 snap-start">
            <button
              onclick="exportToExcel()"
              class="h-full px-5 py-2 rounded-xl text-sm font-bold bg-indigo-500 text-white shadow hover:bg-indigo-600 transition-all flex items-center whitespace-nowrap"
            >
              Export to Excel
            </button>
          </div>

          

          <div class="gap-2 flex flex-shrink-0 bg-gray-200 p-1 rounded-xl shadow-inner border border-gray-300 snap-start">
            <button
              onclick="toggleLabels()"
              id="btn-labels"
              class="px-4 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow text-blue-600 whitespace-nowrap"
            >
              แสดงตัวเลข
            </button>
            <button
              onclick="updateTempAxis('TempB2')"
              id="btn-temp"
              class="px-4 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow text-blue-600 whitespace-nowrap"
            >
              Temp B2
            </button>
            <button
              onclick="updateTempAxis('Climate')"
              id="btn-climate"
              class="px-4 py-2 rounded-lg text-sm font-bold transition-all text-gray-500 hover:text-gray-700 whitespace-nowrap"
            >
              Climate
            </button>
          </div>

          <div class="flex flex-shrink-0 bg-gray-200 p-1 rounded-xl shadow-inner border border-gray-300 snap-start">
            <button id="btn-range-7" onclick="setRange(7)" class="px-3 py-2 text-xs font-bold transition-all text-gray-500 hover:text-gray-700 rounded-lg whitespace-nowrap">7 วัน</button>
            <button id="btn-range-14" onclick="setRange(14)" class="px-3 py-2 text-xs font-bold transition-all text-gray-500 hover:text-gray-700 rounded-lg whitespace-nowrap">14 วัน</button>
            <button id="btn-range-30" onclick="setRange(30)" class="px-3 py-2 text-xs font-bold transition-all text-gray-500 hover:text-gray-700 rounded-lg whitespace-nowrap">30 วัน</button>
            <button id="btn-range-all" onclick="resetZoom()" class="px-3 py-2 text-xs font-bold transition-all bg-white shadow text-blue-600 rounded-lg whitespace-nowrap">ทั้งหมด</button>
          </div>
        </div>
      </div>

      <div class="bg-white p-3 md:p-6 rounded-2xl shadow-xl border border-gray-100 mb-8 mx-2 md:mx-0">
        <div class="relative w-full h-[350px] md:h-[500px]">
          <canvas id="qcChart"></canvas>
        </div>
        <p class="text-center text-[10px] md:text-xs text-gray-400 mt-4 italic">
          * ซูม: ใช้นิ้วถ่างหน้าจอ | เลื่อนกราฟ: ปัดซ้าย-ขวาที่กราฟ
        </p>
      </div>

      <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden mx-2 md:mx-0 mb-10">
        <div class="p-4 md:p-6 border-b border-gray-100 bg-gray-50 flex flex-col md:flex-row md:items-center justify-between gap-2">
          <h2 class="text-lg md:text-xl font-bold text-gray-800">
            ตารางข้อมูลล่าสุด
          </h2>
          <span class="text-xs font-normal text-gray-500 bg-white px-2 py-1 rounded border shadow-sm"
            >แตะที่แถวเพื่อแก้ไข/ลบ</span
          >
        </div>
        <div class="overflow-x-auto hide-scrollbar">
          <table class="min-w-full text-left border-collapse">
            <thead class="bg-blue-50 border-b border-blue-100">
              <tr>
                <th class="px-4 py-3 md:px-6 md:py-4 text-xs font-semibold text-gray-600 uppercase whitespace-nowrap">วันที่ (DATE)</th>
                <th class="px-4 py-3 md:px-6 md:py-4 text-xs font-semibold text-gray-600 uppercase whitespace-nowrap">กะ (Shift)</th>
                <th class="px-4 py-3 md:px-6 md:py-4 text-xs font-semibold text-gray-600 uppercase whitespace-nowrap">ไลน์การผลิต</th>
                <th class="px-4 py-3 md:px-6 md:py-4 text-xs font-semibold text-gray-600 uppercase whitespace-nowrap">รุ่น (Pattern) / Size</th>
                <th class="px-4 py-3 md:px-6 md:py-4 text-xs font-semibold text-gray-600 uppercase whitespace-nowrap">ค่า Seed</th>
                <th class="px-4 py-3 md:px-6 md:py-4 text-xs font-semibold text-gray-600 uppercase whitespace-nowrap">Temp B2 / Climate</th>
              </tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-gray-100">
              <tr>
                <td colspan="6" class="px-6 py-10 text-center text-gray-500 font-medium italic">
                  กำลังโหลดข้อมูล...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div
      id="crud-modal"
      class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 backdrop-blur-sm"
    >
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
        <div class="bg-blue-600 p-4 text-white flex justify-between items-center sticky top-0 z-10">
          <h3 id="modal-title" class="text-lg font-bold">เพิ่มข้อมูล</h3>
          <button onclick="closeModal()" class="text-white hover:text-gray-200 font-bold text-2xl leading-none">
            &times;
          </button>
        </div>

        <div class="p-4 md:p-6 overflow-y-auto space-y-4">
          <div class="flex items-center space-x-2 p-3 bg-red-50 rounded-lg border border-red-100">
            <input
              type="checkbox"
              id="form-jobchange"
              class="w-5 h-5 text-red-600 rounded focus:ring-red-500"
            />
            <label
              for="form-jobchange"
              class="text-sm font-bold text-red-800 cursor-pointer select-none"
            >
              ⚠️ Job Change (มีการเปลี่ยนรุ่นการผลิต)
            </label>
          </div>
          <input type="hidden" id="form-no" />
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700">วันที่</label>
              <input
                type="date"
                id="form-date"
                class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500"
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700">กะ (Shift)</label>
              <select
                id="form-shift"
                class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500"
              >
                <option value="Morning">Morning (เช้า)</option>
                <option value="Evening">Evening (เย็น)</option>
                <option value="Night">Night (กลางคืน)</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700">ไลน์การผลิต</label>
              <select
                id="form-line"
                class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500"
              >
                <option value="">-- เลือกไลน์ --</option>
                <option value="2">Line 2</option>
                <option value="3">Line 3</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700"
                >ค่า Seed <span class="text-red-500">*ค่าเฉลี่ย</span></label
              ><input
                type="number"
                step="0.1"
                id="form-seed"
                class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500"
              />
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700">Pattern</label>
              <input
                type="text"
                id="form-pattern"
                class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500"
              />
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700">Size</label>
              <input
                type="text"
                id="form-size"
                placeholder="เช่น 80mm"
                class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500"
              />
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700">Temp B2</label>
              <input
                type="number"
                id="form-tempb2"
                class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500"
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700"
                >อุณหภูมิ <span class="text-red-500">(องศา)</span></label
              ><input
                type="number"
                step="0.1"
                id="form-climate"
                class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500"
              />
            </div>
          </div>
        </div>
        <div class="bg-gray-50 p-4 border-t border-gray-200 flex justify-between items-center sticky bottom-0">
          <button
            id="btn-delete"
            onclick="deleteData()"
            class="px-4 py-2.5 bg-red-500 text-white rounded-lg text-sm font-bold shadow hover:bg-red-600 hidden"
          >
            ลบ
          </button>
          <div class="flex gap-2 w-full justify-end">
            <button
              onclick="closeModal()"
              class="px-4 py-2.5 bg-gray-300 text-gray-700 rounded-lg text-sm font-bold hover:bg-gray-400"
            >
              ยกเลิก
            </button>
            <button
              onclick="saveData()"
              class="px-5 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-bold shadow hover:bg-blue-700 whitespace-nowrap"
            >
              บันทึกข้อมูล
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <script>
      Chart.register(ChartDataLabels);

      const SUPABASE_URL = "https://twrfuwhqbltrjbzohepy.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3cmZ1d2hxYmx0cmpiem9oZXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTA4MzYsImV4cCI6MjA5MDU2NjgzNn0._JRdATjIdVb7qpDkEvJbHrGuswuRNdQ3jPuXolKYTKU";

      const { createClient } = supabase;
      const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

      let myChart;
      let rawData = [];
      let showDataLabels = false;
      let currentMode = "add"; 

      // ================= EXPORT EXCEL FUNCTION =================
      function exportToExcel() {
        if (rawData.length === 0) {
          alert("ยังไม่มีข้อมูลสำหรับดาวน์โหลดครับ");
          return;
        }

        const shiftMap = { Morning: "Morning", Evening: "Evening", Night: "Night" };
        
        // จัดเตรียมและแปลงข้อมูลให้เป็นภาษาไทยที่อ่านง่ายสำหรับตาราง Excel
        const exportData = rawData.map((row) => ({
          "วันที่ (Date)": row.DATE || "-",
          "กะ (Shift)": shiftMap[row.Shift] || row.Shift || "-",
          "ไลน์การผลิต (Line)": row.Line ? "Line " + row.Line : "-",
          "รุ่น (Pattern)": row.Pattern || "-",
          "ขนาด (Size)": row.Size || "-",
          "ค่า Seed": row.Seed !== null ? row.Seed : "",
          "อุณหภูมิ Temp B2 (°C)": row.TempB2 !== null ? row.TempB2 : "",
          "อุณหภูมิ Climate (°C)": row.Climate !== null ? Number(row.Climate).toFixed(1) : "",
          "Job Change (เปลี่ยนรุ่น)": row.JobChange == 1 ? "✔ ใช่" : ""
        }));

        // สร้างแผ่นงาน (Worksheet) จากข้อมูลที่จัดเตรียมไว้
        const worksheet = XLSX.utils.json_to_sheet(exportData);
        // สร้างสมุดงาน (Workbook)
        const workbook = XLSX.utils.book_new();
        // นำแผ่นงานไปใส่ในสมุดงาน
        XLSX.utils.book_append_sheet(workbook, worksheet, "Lab Data");

        // สร้างชื่อไฟล์ตามวันที่ปัจจุบัน (เช่น QC_Report_2026-04-02.xlsx)
        const today = new Date().toISOString().split('T')[0];
        
        // สั่งสร้างไฟล์และดาวน์โหลด
        XLSX.writeFile(workbook, `Lab_Report_SEED${today}.xlsx`);
      }
      // ========================================================

      function openModal(mode, rowStr = null) {
        const modal = document.getElementById("crud-modal");
        const title = document.getElementById("modal-title");
        const btnDelete = document.getElementById("btn-delete");

        currentMode = mode;

        if (mode === "add") {
          title.innerText = "เพิ่มข้อมูลใหม่";
          btnDelete.classList.add("hidden");
          document.getElementById("form-no").value = "";
          document.getElementById("form-date").value = "";
          document.getElementById("form-shift").value = "Morning";
          document.getElementById("form-line").value = "";
          document.getElementById("form-seed").value = "";
          document.getElementById("form-pattern").value = "";
          document.getElementById("form-size").value = "";
          document.getElementById("form-tempb2").value = "";
          document.getElementById("form-climate").value = "";
          document.getElementById("form-jobchange").checked = false;
        } else if (mode === "edit" && rowStr) {
          title.innerText = "แก้ไข / ลบข้อมูล";
          btnDelete.classList.remove("hidden");

          const row = JSON.parse(decodeURIComponent(rowStr));
          document.getElementById("form-no").value = row.No;
          document.getElementById("form-date").value = row.DATE || "";
          document.getElementById("form-shift").value = row.Shift || "Morning";
          document.getElementById("form-line").value = row.Line ? row.Line.toString() : "";
          document.getElementById("form-seed").value = row.Seed || "";
          document.getElementById("form-pattern").value = row.Pattern || "";
          document.getElementById("form-size").value = row.Size || "";
          document.getElementById("form-tempb2").value = row.TempB2 || "";
          document.getElementById("form-climate").value =
            row.Climate !== null ? Number(row.Climate).toFixed(1) : "";
          document.getElementById("form-jobchange").checked = (row.JobChange == 1);
        }

        modal.classList.remove("hidden");
      }

      function closeModal() {
        document.getElementById("crud-modal").classList.add("hidden");
      }

      async function saveData() {
        const lineElement = document.getElementById("form-line");
        const lineValue = lineElement.value; 

        const dataPayload = {
          DATE: document.getElementById("form-date").value,
          Shift: document.getElementById("form-shift").value,
          Line: lineValue ? parseInt(lineValue) : null,
          Seed: parseFloat(document.getElementById("form-seed").value) || null,
          Pattern: document.getElementById("form-pattern").value,
          Size: document.getElementById("form-size").value,
          TempB2: parseInt(document.getElementById("form-tempb2").value) || null,
          Climate: parseFloat(document.getElementById("form-climate").value) || null,
          JobChange: document.getElementById("form-jobchange").checked ? 1 : null
        };

        try {
          if (currentMode === "add") {
            const { error } = await supabaseClient
              .from("SEED Count")
              .insert([dataPayload]);
            if (error) throw error;
            alert("เพิ่มข้อมูลสำเร็จ!");
          } else if (currentMode === "edit") {
            const noId = document.getElementById("form-no").value;
            const { error } = await supabaseClient
              .from("SEED Count")
              .update(dataPayload)
              .eq("No", noId);
            if (error) throw error;
            alert("อัปเดตข้อมูลสำเร็จ!");
          }
          closeModal();
          fetchQCData(); 
        } catch (error) {
          alert("เกิดข้อผิดพลาด: " + error.message);
        }
      }

      async function deleteData() {
        if (!confirm("คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลแถวนี้?")) return;

        const noId = document.getElementById("form-no").value;
        try {
          const { error } = await supabaseClient
            .from("SEED Count")
            .delete()
            .eq("No", noId);
          if (error) throw error;
          alert("ลบข้อมูลสำเร็จ!");
          closeModal();
          fetchQCData();
        } catch (error) {
          alert("เกิดข้อผิดพลาด: " + error.message);
        }
      }

      async function fetchQCData() {
        const tableBody = document.getElementById("table-body");
        try {
          const { data, error } = await supabaseClient
            .from("SEED Count")
            .select("*")
            .order("No", { ascending: true })
            .limit(1000);
          if (error) throw error;

          rawData = data.map((row) => ({
            ...row,
            Climate:
              row.Climate !== null && row.Climate !== ""
                ? parseFloat(Number(row.Climate).toFixed(1))
                : null,
          }));

          renderChart();
          renderTable(rawData);
        } catch (err) {
          tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-10 text-center text-red-500 font-bold italic">เกิดข้อผิดพลาด: ${err.message}</td></tr>`;
        }
      }

      function renderChart() {
        const shiftMap = { Morning: "เช้า", Evening: "เย็น", Night: "กลางคืน" };
        const labels = rawData.map((row) => {
          const thaiShift = shiftMap[row.Shift] || row.Shift;
          return row.Shift === "Evening" || row.Shift === "เย็น"
            ? [thaiShift, row.DATE || ""]
            : [thaiShift, ""];
        });

        const line2Data = rawData.map((row) => row.Line == 2 ? row.Seed : null);
        const line3Data = rawData.map((row) => row.Line == 3 ? row.Seed : null);
        const tempB2Data = rawData.map((row) => row.TempB2);

        const ctx = document.getElementById("qcChart").getContext("2d");
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Seed: Line 2",
                data: line2Data,
                borderColor: "#3b82f6",
                borderWidth: 3,
                pointRadius: (context) => {
                  const index = context.dataIndex;
                  return (rawData[index] && rawData[index].JobChange == 1) ? 6 : (showDataLabels ? 3 : 3);
                },
                pointBorderWidth: (context) => {
                  const index = context.dataIndex;
                  return (rawData[index] && rawData[index].JobChange == 1) ? 3 : 1;
                },
                pointBorderColor: (context) => {
                  const index = context.dataIndex;
                  return (rawData[index] && rawData[index].JobChange == 1) ? "#e51c23" : "#3b82f6";
                },
                pointBackgroundColor: (context) => {
                  const index = context.dataIndex;
                  return (rawData[index] && rawData[index].JobChange == 1) ? "#fff" : "#3b82f6";
                },
                spanGaps: true,
              },
              {
                label: "Seed: Line 3",
                data: line3Data,
                borderColor: "#10b981",
                borderWidth: 3,
                pointRadius: (context) => {
                  const index = context.dataIndex;
                  return (rawData[index] && rawData[index].JobChange == 1) ? 6 : (showDataLabels ? 3 : 3);
                },
                pointBorderWidth: (context) => {
                  const index = context.dataIndex;
                  return (rawData[index] && rawData[index].JobChange == 1) ? 3 : 1;
                },
                pointBackgroundColor: (context) => {
                  const index = context.dataIndex;
                  return (rawData[index] && rawData[index].JobChange == 1) ? "#fff" : "#10b981";
                },
                pointBorderColor: (context) => {
                  const index = context.dataIndex;
                  return (rawData[index] && rawData[index].JobChange == 1) ? "#e51c23" : "#10b981";
                },
                spanGaps: true,
              },
              {
                label: "อุณหภูมิ (Temp B2)",
                data: tempB2Data,
                borderColor: "#ef4444",
                borderWidth: 3,
                pointRadius: () => (showDataLabels ? 3 : 0),
                fill: false,
                yAxisID: "yTemp",
                tension: 0.3,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                ticks: {
                  maxRotation: 0,
                  minRotation: 0,
                  font: { size: 10, weight: "bold" },
                },
                grid: {
                  display: true,
                  drawOnChartArea: true,
                  color: (context) =>
                    context.index !== undefined &&
                    rawData[context.index] &&
                    (rawData[context.index].Shift === "Morning" ||
                      rawData[context.index].Shift === "เช้า")
                      ? "rgba(156, 163, 175, 0.6)"
                      : "transparent",
                  lineWidth: (context) =>
                    context.index !== undefined &&
                    rawData[context.index] &&
                    (rawData[context.index].Shift === "Morning" ||
                      rawData[context.index].Shift === "เช้า")
                      ? 1.5
                      : 0,
                },
              },
              y: {
                min: 30,
                max: 1400,
                title: {
                  display: true,
                  text: "Seed Count",
                  font: { weight: "bold" },
                },
              },
              yTemp: {
                position: "right",
                min: 1220,
                max: 1260,
                title: {
                  display: true,
                  text: "Temperature (°C)",
                  font: { weight: "bold" },
                },
                grid: { drawOnChartArea: false },
              },
            },
            plugins: {
              legend: { position: "top", labels: { usePointStyle: true } },
              zoom: {
                pan: { enabled: true, mode: "x" },
                zoom: {
                  wheel: { enabled: true },
                  pinch: { enabled: true },
                  mode: "x",
                },
              },
              datalabels: {
                display: () => showDataLabels,
                font: { size: 9, weight: "bold" },
                color: (context) => context.dataset.borderColor,
                align: "top",
                offset: 4,
                formatter: (value, context) =>
                  value === null
                    ? ""
                    : context.datasetIndex === 2 &&
                      context.dataset.label.includes("Climate")
                    ? Number(value).toFixed(1)
                    : value,
              },
            },
          },
        });
      }

      function renderTable(data) {
        const tableBody = document.getElementById("table-body");
        tableBody.innerHTML = "";
        const tableData = [...data].reverse();

        tableData.forEach((row) => {
          const tr = document.createElement("tr");
          const rowString = encodeURIComponent(JSON.stringify(row));
          tr.setAttribute("onclick", `openModal('edit', '${rowString}')`);
          tr.className = "hover:bg-blue-100 transition-colors border-b cursor-pointer"; 

          const climateDisplay = row.Climate !== null ? Number(row.Climate).toFixed(1) : "-";
          
          tr.innerHTML = `
            <td class="px-4 py-3 md:px-6 md:py-4 text-xs md:text-sm font-medium text-gray-900 whitespace-nowrap">${row.DATE || "-"}</td>
            <td class="px-4 py-3 md:px-6 md:py-4 text-xs md:text-sm text-gray-600 whitespace-nowrap">${row.Shift || "-"}</td>
            <td class="px-4 py-3 md:px-6 md:py-4 text-xs md:text-sm font-bold text-gray-700 whitespace-nowrap">${row.Line ? "Line " + row.Line : "-"}</td>
            <td class="px-4 py-3 md:px-6 md:py-4 text-xs md:text-sm text-gray-600 whitespace-nowrap">${row.Pattern || "-"} / ${row.Size || "-"}</td>
            <td class="px-4 py-3 md:px-6 md:py-4 text-xs md:text-sm font-bold text-blue-700 whitespace-nowrap">${row.Seed || "0"}</td>
            <td class="px-4 py-3 md:px-6 md:py-4 text-xs md:text-sm text-gray-600 whitespace-nowrap"><span class="text-red-500 font-semibold">${row.TempB2 || "-"}°C</span> / <span class="text-orange-500">${climateDisplay}°C</span></td>
          `;
          tableBody.appendChild(tr);
        });
      }

      function updateTempAxis(type) {
        const isTemp = type === "TempB2";
        myChart.data.datasets[2].data = rawData.map((row) =>
          isTemp ? row.TempB2 : row.Climate,
        );
        myChart.data.datasets[2].label = isTemp
          ? "อุณหภูมิ (Temp B2)"
          : "อุณหภูมิ (Climate)";
        if (isTemp) {
          myChart.options.scales.yTemp.min = 1220;
          myChart.options.scales.yTemp.max = 1260;
        } else {
          myChart.options.scales.yTemp.min = 0;
          myChart.options.scales.yTemp.max = 35;
        }
        document.getElementById("btn-temp").className = isTemp
          ? "px-4 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow text-blue-600 whitespace-nowrap"
          : "px-4 py-2 rounded-lg text-sm font-bold transition-all text-gray-500 hover:text-gray-700 whitespace-nowrap";
        document.getElementById("btn-climate").className = !isTemp
          ? "px-4 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow text-blue-600 whitespace-nowrap"
          : "px-4 py-2 rounded-lg text-sm font-bold transition-all text-gray-500 hover:text-gray-700 whitespace-nowrap";
        myChart.update();
      }

      function toggleLabels() {
        showDataLabels = !showDataLabels; 
        document.getElementById("btn-labels").innerHTML = showDataLabels ? "❌ ซ่อนตัวเลข" : "แสดงตัวเลข";
        myChart.update(); 
      }

      function setRange(days) {
        // อัปเดตสีปุ่มให้สว่างขึ้นตามวันที่เลือก
        updateRangeUI(`btn-range-${days}`);

        const pointsToShow = days * 6; 
        const total = rawData.length;
        showDataLabels = (days <= 14);
        document.getElementById("btn-labels").innerHTML = showDataLabels ? "❌ ซ่อนตัวเลข" : "แสดงตัวเลข";
        myChart.zoomScale('x', { min: Math.max(0, total - pointsToShow), max: total }, 'default');
        myChart.update(); 
      }

      function resetZoom() {
        // อัปเดตให้ปุ่ม 'ทั้งหมด' สว่างขึ้น
        updateRangeUI('btn-range-all');

        showDataLabels = false; 
        document.getElementById("btn-labels").innerHTML = "แสดงตัวเลข";
        myChart.resetZoom();
        myChart.update();
      }

      function updateRangeUI(activeId) {
        const buttonIds = ['btn-range-7', 'btn-range-14', 'btn-range-30', 'btn-range-all'];
        
        buttonIds.forEach(id => {
          const btn = document.getElementById(id);
          if (id === activeId) {
            // ถ้าเป็นปุ่มที่ถูกกด ให้เป็นสีขาว ตัวหนังสือสีฟ้า มีเงา
            btn.className = "px-3 py-2 text-xs font-bold transition-all bg-white shadow text-blue-600 rounded-lg whitespace-nowrap";
          } else {
            // ถ้าไม่ได้ถูกกด ให้พื้นหลังกลืนไปกับสีเทา ตัวหนังสือสีเทา
            btn.className = "px-3 py-2 text-xs font-bold transition-all text-gray-500 hover:text-gray-700 rounded-lg whitespace-nowrap";
          }
        });
      }

      window.onload = fetchQCData;
    </script>
  </body>
</html>
