            <div class="w-full md:w-1/3">
              <label class="block text-xs font-bold text-green-800 mb-1 uppercase">ช่วงเวลา (กะ)</label>

      <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden mx-2 md:mx-0 mb-10">

          <h2 class="text-lg md:text-xl font-bold text-gray-800">ตารางข้อมูลที่แสดงผลอยู่</h2>
          <span class="text-xs font-normal text-gray-500 bg-white px-2 py-1 rounded border shadow-sm">แตะที่แถวเพื่อแก้ไข/ลบ</span>
        </div>
        <div class="overflow-x-auto hide-scrollbar">

            <thead class="bg-gray-100 border-b border-gray-200">

              <tr><td colspan="7" class="px-6 py-10 text-center text-gray-500 font-medium italic">กำลังโหลดข้อมูล...</td></tr>
            </tbody>
          </table>
        </div>

    </div>

    <div id="crud-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
        <div class="bg-blue-600 p-4 text-white flex justify-between items-center sticky top-0 z-10">
          <h3 id="modal-title" class="text-lg font-bold">เพิ่มข้อมูล</h3>
          <button onclick="closeModal()" class="text-white hover:text-gray-200 font-bold text-2xl leading-none">&times;</button>
        </div>
        <div class="p-4 md:p-6 overflow-y-auto space-y-4">
          <div class="flex items-center space-x-2 p-3 bg-red-50 rounded-lg border border-red-100">
            <input type="checkbox" id="form-jobchange" class="w-5 h-5 text-red-600 rounded focus:ring-red-500" />
            <label for="form-jobchange" class="text-sm font-bold text-red-800 cursor-pointer select-none">⚠️ Job Change (มีการเปลี่ยนรุ่นการผลิต)</label>
          </div>
          <input type="hidden" id="form-no" />
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-sm font-semibold text-gray-700">วันที่</label><input type="date" id="form-date" class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500" /></div>
            <div><label class="block text-sm font-semibold text-gray-700">เวลา (กะ)</label>
              <select id="form-shift" class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500">
                <option value="Morning">08.00 (กะเช้า)</option>
                <option value="Evening">16.00 (กะเย็น)</option>
                <option value="Night">00.00 (กะกลางคืน)</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-sm font-semibold text-gray-700">ไลน์การผลิต</label><select id="form-line" class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500"><option value="">-- เลือกไลน์ --</option><option value="2">Line 2</option><option value="3">Line 3</option></select></div>
            <div><label class="block text-sm font-semibold text-gray-700">ค่า Seed <span class="text-red-500">*ค่าเฉลี่ย</span></label><input type="number" step="0.1" id="form-seed" class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500" /></div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-sm font-semibold text-gray-700">Pattern</label><input type="text" id="form-pattern" class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500" /></div>
            <div><label class="block text-sm font-semibold text-gray-700">Size</label><input type="text" id="form-size" placeholder="เช่น 80mm" class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500" /></div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-sm font-semibold text-gray-700">Temp B2</label><input type="number" id="form-tempb2" class="mt-1 w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500" /></div>
          </div>
        </div>
        <div class="bg-gray-50 p-4 border-t border-gray-200 flex justify-between items-center sticky bottom-0">
          <button id="btn-delete" onclick="deleteData()" class="px-4 py-2.5 bg-red-500 text-white rounded-lg text-sm font-bold shadow hover:bg-red-600 hidden">ลบ</button>
          <div class="flex gap-2 w-full justify-end">
            <button onclick="closeModal()" class="px-4 py-2.5 bg-gray-300 text-gray-700 rounded-lg text-sm font-bold hover:bg-gray-400">ยกเลิก</button>
            <button onclick="saveData()" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-bold shadow hover:bg-blue-700 whitespace-nowrap">บันทึกข้อมูล</button>
          </div>
        </div>
      </div>
    </div>
    
    <script>
      Chart.register(ChartDataLabels);

      const SUPABASE_URL = "https://twrfuwhqbltrjbzohepy.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3cmZ1d2hxYmx0cmpiem9oZXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5OTA4MzYsImV4cCI6MjA5MDU2NjgzNn0._JRdATjIdVb7qpDkEvJbHrGuswuRNdQ3jPuXolKYTKU";
      const { createClient } = supabase;
      const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

      let myChart;
      let rawData = [];
      let dataset1Data = []; 
      let dataset2Data = []; 
      let showDataLabels = false;
      let currentMode = "add"; 

      // ================= EXPORT EXCEL =================
      function exportToExcel() {
        const combinedData = [...dataset1Data, ...dataset2Data];
        const uniqueData = Array.from(new Set(combinedData.map(a => a.No))).map(id => combinedData.find(a => a.No === id));
        
        if (uniqueData.length === 0) {
          alert("ยังไม่มีข้อมูลสำหรับดาวน์โหลดครับ");
          return;
        }

        const shiftMap = { Morning: "08.00น.", Evening: "16.00น.", Night: "00.00น." };
        const exportData = uniqueData.map((row) => ({
          "วันที่ (Date)": row.DATE || "-",
          "เวลา (Time)": shiftMap[row.Shift] || row.Shift || "-",
          "ไลน์การผลิต (Line)": row.Line ? "Line " + row.Line : "-",
          "รุ่น (Pattern)": row.Pattern || "-",
          "ขนาด (Size)": row.Size || "-",
          "ค่า Seed": row.Seed !== null ? row.Seed : "",
          "อุณหภูมิ Temp B2 (°C)": row.TempB2 !== null ? row.TempB2 : "",
          "อุณหภูมิ Climate (°C)": row.Climate !== null ? Number(row.Climate).toFixed(1) : "",
          "Job Change (เปลี่ยนรุ่น)": row.JobChange == 1 ? "✔ ใช่" : ""
        }));

        const worksheet = XLSX.utils.json_to_sheet(exportData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Lab Data");
        const today = new Date().toISOString().split('T')[0];
        XLSX.writeFile(workbook, `Lab_Report_SEED_${today}.xlsx`);
      }

      // ================= FILTER FUNCTIONS =================
      function populatePatternFilter() {
        const patternSelects = [document.getElementById("f1-pattern"), document.getElementById("f2-pattern")];
        const uniquePatterns = [...new Set(rawData.map(item => item.Pattern).filter(p => p))].sort();
        
        patternSelects.forEach(select => {
          const currentVal = select.value;
          select.innerHTML = '<option value="ALL">ทุกรุ่น</option>';
          uniquePatterns.forEach(pattern => {
            const option = document.createElement("option");
            option.value = pattern;
            option.text = pattern;
            if(pattern === currentVal) option.selected = true;
            select.appendChild(option);
          });
        });
      }

      function filterDataset(data, shiftId, lineId, patternId) {
        const shiftFilter = document.getElementById(shiftId).value;
        const lineFilter = document.getElementById(lineId).value;
        const patternFilter = document.getElementById(patternId).value;

        return data.filter(row => {
          let matchShift = shiftFilter === "ALL" || row.Shift === shiftFilter;
          let matchLine = lineFilter === "ALL" || (row.Line && row.Line.toString() === lineFilter);
          let matchPattern = patternFilter === "ALL" || row.Pattern === patternFilter;
          return matchShift && matchLine && matchPattern;
        });
      }

      function applyFilters() {
        dataset1Data = filterDataset(rawData, "f1-shift", "f1-line", "f1-pattern");
        dataset2Data = filterDataset(rawData, "f2-shift", "f2-line", "f2-pattern");

        const totalRecords = new Set([...dataset1Data.map(d=>d.No), ...dataset2Data.map(d=>d.No)]).size;
        document.getElementById("data-count-text").innerText = `แสดงข้อมูล ${totalRecords} รายการ`;
        
        renderChart();
        renderTable();
      }

      function clearFilters() {
        document.getElementById("f1-shift").value = "ALL";
        document.getElementById("f1-line").value = "2";
        document.getElementById("f1-pattern").value = "ALL";
        
        document.getElementById("f2-shift").value = "ALL";
        document.getElementById("f2-line").value = "3";
        document.getElementById("f2-pattern").value = "ALL";
        
        applyFilters();
      }

      // ================= CRUD FUNCTIONS =================
      function openModal(mode, rowStr = null) {
        const modal = document.getElementById("crud-modal");
        const title = document.getElementById("modal-title");
        const btnDelete = document.getElementById("btn-delete");
        currentMode = mode;
        if (mode === "add") {
          title.innerText = "เพิ่มข้อมูลใหม่";
          btnDelete.classList.add("hidden");
          document.getElementById("form-no").value = "";
          document.getElementById("form-date").value = "";
          document.getElementById("form-shift").value = "Morning";
          document.getElementById("form-line").value = "";
          document.getElementById("form-seed").value = "";
          document.getElementById("form-pattern").value = "";
          document.getElementById("form-size").value = "";
          document.getElementById("form-tempb2").value = "";
          document.getElementById("form-climate").value = "";
          document.getElementById("form-jobchange").checked = false;
        } else if (mode === "edit" && rowStr) {
          title.innerText = "แก้ไข / ลบข้อมูล";
          btnDelete.classList.remove("hidden");
          const row = JSON.parse(decodeURIComponent(rowStr));
          document.getElementById("form-no").value = row.No;
          document.getElementById("form-date").value = row.DATE || "";
          document.getElementById("form-shift").value = row.Shift || "Morning";
          document.getElementById("form-line").value = row.Line ? row.Line.toString() : "";
          document.getElementById("form-seed").value = row.Seed || "";
          document.getElementById("form-pattern").value = row.Pattern || "";
          document.getElementById("form-size").value = row.Size || "";
          document.getElementById("form-tempb2").value = row.TempB2 || "";
          document.getElementById("form-climate").value = row.Climate !== null ? Number(row.Climate).toFixed(1) : "";
          document.getElementById("form-jobchange").checked = (row.JobChange == 1);
        }
        modal.classList.remove("hidden");
      }

      function closeModal() { document.getElementById("crud-modal").classList.add("hidden"); }

      async function saveData() {
        const lineValue = document.getElementById("form-line").value; 
        const dataPayload = {
          DATE: document.getElementById("form-date").value,
          Shift: document.getElementById("form-shift").value,
          Line: lineValue ? parseInt(lineValue) : null,
          Seed: parseFloat(document.getElementById("form-seed").value) || null,
          Pattern: document.getElementById("form-pattern").value,
          Size: document.getElementById("form-size").value,
          TempB2: parseInt(document.getElementById("form-tempb2").value) || null,
          Climate: parseFloat(document.getElementById("form-climate").value) || null,
          JobChange: document.getElementById("form-jobchange").checked ? 1 : null
        };

        try {
          if (currentMode === "add") {
            const { error } = await supabaseClient.from("SEED Count").insert([dataPayload]);
            if (error) throw error;
          } else if (currentMode === "edit") {
            const noId = document.getElementById("form-no").value;
            const { error } = await supabaseClient.from("SEED Count").update(dataPayload).eq("No", noId);
            if (error) throw error;
          }
          closeModal();
          fetchQCData(); 
        } catch (error) { alert("เกิดข้อผิดพลาด: " + error.message); }
      }

      async function deleteData() {
        if (!confirm("คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลแถวนี้?")) return;
        const noId = document.getElementById("form-no").value;
        try {
          const { error } = await supabaseClient.from("SEED Count").delete().eq("No", noId);
          if (error) throw error;
          closeModal();
          fetchQCData();
        } catch (error) { alert("เกิดข้อผิดพลาด: " + error.message); }
      }

      // ================= FETCH & RENDER =================
      async function fetchQCData() {
        const tableBody = document.getElementById("table-body");
        try {
          const { data, error } = await supabaseClient.from("SEED Count").select("*").order("No", { ascending: true }).limit(1000);
          if (error) throw error;

          rawData = data.map((row) => ({
            ...row,
            Climate: row.Climate !== null && row.Climate !== "" ? parseFloat(Number(row.Climate).toFixed(1)) : null,
          }));

          populatePatternFilter();
          
          document.getElementById("f1-line").value = "2";
          document.getElementById("f2-line").value = "3";
          applyFilters();

        } catch (err) {
          tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-10 text-center text-red-500 font-bold italic">เกิดข้อผิดพลาด: ${err.message}</td></tr>`;
        }
      }

      function renderChart() {
        const allFilteredData = [...dataset1Data, ...dataset2Data];
        
        // --- ตัวช่วยแปลงวันที่ ให้กลายเป็นตัวเลขเวลาปฏิทินจริงๆ ---
        function getRealTime(dateStr) {
          if (!dateStr) return 0;
          let d = new Date(dateStr);
          if (!isNaN(d)) return d.getTime(); // รองรับรูปแบบ YYYY-MM-DD
          
          // เผื่อมีข้อมูลเก่าที่พิมพ์เป็น DD/MM/YYYY หรือ DD-MM-YYYY
          const parts = dateStr.split(/[-/]/);
          if (parts.length === 3) {
            d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
            if (!isNaN(d)) return d.getTime();
          }
          return 0; // ถ้าอ่านไม่ออกจริงๆ ให้คืนค่า 0
        }

        // ล็อกการเรียงลำดับให้เป็น วันที่(ปฏิทิน) -> กะ (เช้า -> เย็น -> กลางคืน)
        const shiftOrder = { "Morning": 1, "Evening": 2, "Night": 3 };
        const uniqueKeys = [...new Set(allFilteredData.map(row => `${row.DATE}_${row.Shift}`))].sort((a, b) => {
            const [dateA, shiftA] = a.split('_');
            const [dateB, shiftB] = b.split('_');
            
            const timeA = getRealTime(dateA);
            const timeB = getRealTime(dateB);
            
            // 1. เทียบวันที่ก่อน
            if (timeA !== timeB) return timeA - timeB; 
            // 2. ถ้าวันเดียวกัน ให้เรียงตามกะ
            return (shiftOrder[shiftA] || 99) - (shiftOrder[shiftB] || 99); 
        });

        const shiftMap = { Morning: "08.00น.", Evening: "16.00น.", Night: "00.00น." };
        const labels = [];
        const ds1Line = [];
        const ds2Line = [];
        const tempB2Data = [];
        const jc1Data = [];
        const jc2Data = [];
        
        const isTempActive = document.getElementById("btn-temp").classList.contains("bg-white");

        uniqueKeys.forEach(key => {
          const [date, shift] = key.split('_');
          const timeDisplay = shiftMap[shift] || shift;
          
          const f1Shift = document.getElementById("f1-shift").value;
          const f2Shift = document.getElementById("f2-shift").value;
          const shiftSpecific = (f1Shift !== "ALL" || f2Shift !== "ALL");
          
          // โชว์วันที่กำกับไว้ที่กะ 16.00 หรือโชว์ทุกจุดถ้ามีการกรองเวลา
          if (shift === "Evening" || shiftSpecific) {
            labels.push([timeDisplay, date]);
          } else {
            labels.push([timeDisplay, ""]);
          }

          const match1 = dataset1Data.find(r => r.DATE === date && r.Shift === shift);
          ds1Line.push(match1 ? match1.Seed : null);
          jc1Data.push(match1 ? match1.JobChange : null);

          const match2 = dataset2Data.find(r => r.DATE === date && r.Shift === shift);
          ds2Line.push(match2 ? match2.Seed : null);
          jc2Data.push(match2 ? match2.JobChange : null);

          const tempMatch = match1 || match2; 
          tempB2Data.push(tempMatch ? (isTempActive ? tempMatch.TempB2 : tempMatch.Climate) : null);
        });

        const ctx = document.getElementById("qcChart").getContext("2d");
        if (myChart) myChart.destroy();

        const getLabelName = (num) => {
          const line = document.getElementById(`f${num}-line`).value;
          const shift = document.getElementById(`f${num}-shift`).value;
          let name = `Seed: Dataset ${num}`;
          if(line !== "ALL") name += ` (Line ${line})`;
          if(shift !== "ALL") name += ` (${shiftMap[shift]})`;
          return name;
        }

        myChart = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: getLabelName(1), data: ds1Line, borderColor: "#3b82f6", borderWidth: 3,
                pointRadius: (ctx) => (jc1Data[ctx.dataIndex] == 1) ? 6 : (showDataLabels ? 3 : 3),
                pointBorderWidth: (ctx) => (jc1Data[ctx.dataIndex] == 1) ? 3 : 1,
                pointBorderColor: (ctx) => (jc1Data[ctx.dataIndex] == 1) ? "#e51c23" : "#3b82f6",
                pointBackgroundColor: (ctx) => (jc1Data[ctx.dataIndex] == 1) ? "#fff" : "#3b82f6",
                spanGaps: true,
              },
              {
                label: getLabelName(2), data: ds2Line, borderColor: "#10b981", borderWidth: 3,
                pointRadius: (ctx) => (jc2Data[ctx.dataIndex] == 1) ? 6 : (showDataLabels ? 3 : 3),
                pointBorderWidth: (ctx) => (jc2Data[ctx.dataIndex] == 1) ? 3 : 1,
                pointBackgroundColor: (ctx) => (jc2Data[ctx.dataIndex] == 1) ? "#fff" : "#10b981",
                pointBorderColor: (ctx) => (jc2Data[ctx.dataIndex] == 1) ? "#e51c23" : "#10b981",
                spanGaps: true,
              },
              {
                label: isTempActive ? "อุณหภูมิ (Temp B2)" : "อุณหภูมิ (Climate)",
                data: tempB2Data, borderColor: "#ef4444", borderWidth: 3,
                pointRadius: () => (showDataLabels ? 3 : 0), fill: false, yAxisID: "yTemp", tension: 0.3,
              },
            ],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
              x: {
                ticks: { maxRotation: 0, minRotation: 0, font: { size: 10, weight: "bold" } },
                grid: {
                  display: true, drawOnChartArea: true,
                  color: (ctx) => {
                    if (ctx.index === undefined || !uniqueKeys[ctx.index]) return "transparent";
                    const shift = uniqueKeys[ctx.index].split('_')[1];
                    return (shift === "Morning") ? "rgba(156, 163, 175, 0.6)" : "transparent";
                  },
                  lineWidth: (ctx) => {
                    if (ctx.index === undefined || !uniqueKeys[ctx.index]) return 0;
                    const shift = uniqueKeys[ctx.index].split('_')[1];
                    return (shift === "Morning") ? 1.5 : 0;
                  },
                },
              },
              y: { min: -50, max: 1200, title: { display: true, text: "Seed Count", font: { weight: "bold" } } },
              yTemp: { position: "right", min: isTempActive ? 1220 : 0, max: isTempActive ? 1260 : 35, title: { display: true, text: "Temperature (°C)", font: { weight: "bold" } }, grid: { drawOnChartArea: false } },
            },
            plugins: {
              legend: { position: "top", labels: { usePointStyle: true } },
              zoom: { pan: { enabled: true, mode: "x" }, zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: "x" } },
              datalabels: {
                display: () => showDataLabels, font: { size: 9, weight: "bold" }, color: (ctx) => ctx.dataset.borderColor, align: "top", offset: 4,
                formatter: (value, ctx) => value === null ? "" : ctx.datasetIndex === 2 && ctx.dataset.label.includes("Climate") ? Number(value).toFixed(1) : value,
              },
            },
          },
        });
      }

      function renderTable() {
        const tableBody = document.getElementById("table-body");
        tableBody.innerHTML = "";
        
        const ds1Labeled = dataset1Data.map(r => ({...r, GroupLabel: "ชุดที่ 1 (น้ำเงิน)"}));
        const ds2Labeled = dataset2Data.map(r => ({...r, GroupLabel: "ชุดที่ 2 (เขียว)"}));
        
        const combinedData = [...ds1Labeled, ...ds2Labeled].sort((a,b) => b.No - a.No); 

        if(combinedData.length === 0) {
           tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-10 text-center text-gray-500 font-medium italic">ไม่พบข้อมูลที่ค้นหา</td></tr>`;
           return;
        }

        const shiftMap = { Morning: "08.00", Evening: "16.00", Night: "00.00" };

        combinedData.forEach((row) => {
          const tr = document.createElement("tr");
          const rowString = encodeURIComponent(JSON.stringify(row));
          tr.setAttribute("onclick", `openModal('edit', '${rowString}')`);
          tr.className = "hover:bg-blue-100 transition-colors border-b cursor-pointer"; 

          
          const groupColor = row.GroupLabel.includes("น้ำเงิน") ? "text-blue-600 bg-blue-50" : "text-green-600 bg-green-50";
          const timeDisplay = shiftMap[row.Shift] || row.Shift || "-";
          
          tr.innerHTML = `
            <td class="px-4 py-3 md:px-6 md:py-4 text-xs md:text-sm font-bold ${groupColor} whitespace-nowrap rounded-lg m-1 inline-block">${row.GroupLabel}</td>
            <td class="px-4 py-3 md:px-6 md:py-4 text-xs md:text-sm font-medium text-gray-900 whitespace-nowrap">${row.DATE || "-"}</td>
            <td class="px-4 py-3 md:px-6 md:py-4 text-xs md:text-sm text-gray-600 whitespace-nowrap">${timeDisplay}</td>
            <td class="px-4 py-3 md:px-6 md:py-4 text-xs md:text-sm font-bold text-gray-700 whitespace-nowrap">${row.Line ? "Line " + row.Line : "-"}</td>
            <td class="px-4 py-3 md:px-6 md:py-4 text-xs md:text-sm text-gray-600 whitespace-nowrap">${row.Pattern || "-"} / ${row.Size || "-"}</td>
            <td class="px-4 py-3 md:px-6 md:py-4 text-xs md:text-sm font-bold text-gray-800 whitespace-nowrap">${row.Seed || "0"}</td>
            <td class="px-4 py-3 md:px-6 md:py-4 text-xs md:text-sm text-gray-600 whitespace-nowrap"><span class="text-red-500 font-semibold">${row.TempB2 || "-"}°C</span>
          `;
          tableBody.appendChild(tr);
        });
      }

      // ================= UI CONTROLS =================
      function updateTempAxis(type) {
        const isTemp = type === "TempB2";
        document.getElementById("btn-temp").className = isTemp ? "px-4 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow text-blue-600 whitespace-nowrap" : "px-4 py-2 rounded-lg text-sm font-bold transition-all text-gray-500 hover:text-gray-700 whitespace-nowrap";
        document.getElementById("btn-climate").className = !isTemp ? "px-4 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow text-blue-600 whitespace-nowrap" : "px-4 py-2 rounded-lg text-sm font-bold transition-all text-gray-500 hover:text-gray-700 whitespace-nowrap";
        renderChart(); 
      }

      function toggleLabels() {
        showDataLabels = !showDataLabels; 
        document.getElementById("btn-labels").innerHTML = showDataLabels ? "❌ ซ่อนตัวเลข" : "แสดงตัวเลข";
        myChart.update(); 
      }

      function updateRangeUI(activeId) {
        const buttonIds = ['btn-range-7', 'btn-range-14', 'btn-range-30', 'btn-range-all'];
        buttonIds.forEach(id => {
          const btn = document.getElementById(id);
          if (id === activeId) {
            btn.className = "px-3 py-2 text-xs font-bold transition-all bg-white shadow text-blue-600 rounded-lg whitespace-nowrap";
          } else {
            btn.className = "px-3 py-2 text-xs font-bold transition-all text-gray-500 hover:text-gray-700 rounded-lg whitespace-nowrap";
          }
        });
      }

      function setRange(days) {
        updateRangeUI(`btn-range-${days}`);
        const pointsToShow = days * 3; 
        const total = myChart.data.labels.length;
        showDataLabels = (days <= 14);
        document.getElementById("btn-labels").innerHTML = showDataLabels ? "❌ ซ่อนตัวเลข" : "แสดงตัวเลข";
        myChart.zoomScale('x', { min: Math.max(0, total - pointsToShow), max: total }, 'default');
        myChart.update(); 
      }

      function resetZoom() {
        updateRangeUI('btn-range-all');
        showDataLabels = false; 
        document.getElementById("btn-labels").innerHTML = "แสดงตัวเลข";
        myChart.resetZoom();
        myChart.update();
      }

      window.onload = fetchQCData;
    </script>
  </body>
</html>
